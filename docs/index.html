<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>rs-ft8n</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
         background: #0a0a0a; color: #e0e0e0; max-width: 960px; margin: 0 auto;
         display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

  /* ── Header ─────────────────────────────────────────────────────────── */
  .header { display: flex; align-items: center; gap: .4rem; padding: .4rem .5rem;
            background: #111; border-bottom: 1px solid #222; flex-shrink: 0; }
  .header h1 { font-size: 1rem; color: #4fc3f7; }
  .mode-tabs { display: flex; gap: 0; margin-left: .5rem; }
  .mode-tabs button { font-size: .75rem; padding: .2rem .6rem; border: 1px solid #333;
    background: #1a1a2e; color: #888; cursor: pointer; }
  .mode-tabs button:first-child { border-radius: 4px 0 0 4px; }
  .mode-tabs button:last-child { border-radius: 0 4px 4px 0; }
  .mode-tabs button.active { background: #0d47a1; color: #4fc3f7; border-color: #4fc3f7; }
  .timer { font-size: .8rem; color: #81c784; font-variant-numeric: tabular-nums; margin-left: auto; }
  .header .gear { font-size: 1.3rem; color: #aaa; cursor: pointer; padding: .1rem .4rem;
    border: 1px solid #444; border-radius: 4px; line-height: 1; }
  .header .gear:hover { color: #4fc3f7; border-color: #4fc3f7; }

  /* ── Waterfall ──────────────────────────────────────────────────────── */
  #waterfall-wrap { position: relative; flex-shrink: 0; cursor: crosshair; }
  #waterfall { width: 100%; display: block; background: #000; border-bottom: 1px solid #222; }
  .scout-mode #waterfall { height: 120px; }
  .snipe-mode #waterfall { height: 280px; }
  #snipe-overlay { position: absolute; top: 0; bottom: 0; background: rgba(79,195,247,0.12);
    border-left: 1px solid rgba(79,195,247,0.5); border-right: 1px solid rgba(79,195,247,0.5);
    pointer-events: none; display: none; }
  #snipe-freq-label { position: absolute; top: 18px; color: #4fc3f7; font-size: .7rem;
    pointer-events: none; display: none; }

  /* ── Scout chat ─────────────────────────────────────────────────────── */
  #scout-view { flex: 1; overflow-y: auto; display: none; }
  .scout-mode #scout-view { display: flex; flex-direction: column; }
  .chat-list { flex: 1; overflow-y: auto; padding: .3rem .5rem; }
  .chat-msg { padding: .3rem .5rem; margin-bottom: .15rem; border-radius: 6px; font-size: .8rem;
    display: flex; align-items: baseline; gap: .4rem; }
  .chat-msg.rx { background: #111; border-left: 3px solid #4fc3f7; }
  .chat-msg.tx { background: #1a1a1a; border-left: 3px solid #666; color: #888; }
  .chat-msg.tx.sending { border-left-color: #f44336; color: #f44336; }
  .chat-msg.qso-active { border-left-color: #4fc3f7; background: #0a1929; }
  .chat-msg.qso-done { border-left-color: #76ff03; }
  .chat-msg .col-freq { color: #888; font-size: .7rem; min-width: 2.8em; text-align: right; }
  .chat-msg .col-dt { color: #666; font-size: .7rem; min-width: 2.5em; text-align: right; }
  .chat-msg .col-snr { color: #81c784; font-size: .7rem; min-width: 2em; text-align: right; }
  .chat-msg .text { flex: 1; }
  .chat-msg .text .call { color: #ffeb3b; font-weight: bold; }
  .chat-msg .text .target { color: #76ff03; font-weight: bold; }
  .chat-actions { display: flex; gap: .3rem; padding: .2rem .5rem; }
  .chat-actions button { font-size: .75rem; padding: .2rem .5rem; border-radius: 4px;
    border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; cursor: pointer; }
  .chat-actions button.primary { background: #0d47a1; border-color: #4fc3f7; color: #4fc3f7; }

  /* ── Snipe view ─────────────────────────────────────────────────────── */
  #snipe-view { flex: 1; overflow-y: auto; display: none; padding: .3rem .5rem; }
  .snipe-mode #snipe-view { display: flex; flex-direction: column; }
  .snipe-target { background: #111; border: 1px solid #333; border-radius: 6px;
    padding: .5rem; margin-bottom: .4rem; }
  .snipe-target .dx-call { font-size: 1.2rem; color: #76ff03; font-weight: bold; }
  .snipe-target .dx-msg { font-size: .9rem; color: #ffeb3b; margin-top: .3rem; }
  .snipe-target .dx-info { font-size: .75rem; color: #888; }
  .qso-progress { display: flex; align-items: center; gap: .3rem; margin: .4rem 0;
    font-size: .8rem; }
  .qso-progress .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #555; }
  .qso-progress .dot.done { background: #76ff03; border-color: #76ff03; }
  .qso-progress .dot.current { background: #4fc3f7; border-color: #4fc3f7; }
  .qso-progress .label { color: #4fc3f7; font-weight: bold; margin-left: .3rem; }
  .snipe-band { font-size: .75rem; color: #666; margin-top: .3rem; }
  .snipe-band span { margin-right: .8rem; }
  .snipe-phase-tabs { display: flex; gap: 0; }
  .snipe-phase-tabs button { font-size: .75rem; padding: .2rem .6rem; border: 1px solid #333;
    background: #1a1a2e; color: #888; cursor: pointer; }
  .snipe-phase-tabs button:first-child { border-radius: 4px 0 0 4px; }
  .snipe-phase-tabs button:last-child { border-radius: 0 4px 4px 0; }
  .snipe-phase-tabs button.active { background: #1b5e20; color: #76ff03; border-color: #76ff03; }
  .snipe-call-phase #snipe-callers { display: none; }
  .snipe-call-phase #snipe-band { display: none; }

  /* ── Bottom bar ─────────────────────────────────────────────────────── */
  .bottom-bar { display: flex; align-items: center; gap: .3rem; padding: .3rem .5rem;
    background: #111; border-top: 1px solid #222; flex-shrink: 0; flex-wrap: wrap; }
  .bottom-bar button { font-size: .8rem; padding: .35rem .7rem; border-radius: 5px;
    border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; cursor: pointer;
    font-weight: bold; }
  .bottom-bar button.halt { border-color: #f44336; color: #f44336; }
  .bottom-bar button:disabled { opacity: 0.3; cursor: default; }
  .bottom-bar .status { font-size: .7rem; color: #888; flex: 1; min-width: 0; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .bottom-bar label { font-size: .75rem; display: flex; align-items: center; gap: .3rem; }
  @keyframes pulse { to { opacity: 0.6; } }
  #tx-actions { display: flex; gap: .3rem; flex-wrap: wrap; }
  #tx-actions button { font-size: .8rem; padding: .35rem .7rem; border-radius: 5px;
    border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; cursor: pointer;
    font-weight: bold; }
  #tx-actions button.cq { background: #0d47a1; border-color: #4fc3f7; color: #fff; }
  #tx-actions button.tx-msg { background: #1a1a2e; border-color: #ffeb3b; color: #ffeb3b;
    font-weight: normal; font-size: .75rem; }
  #tx-actions button.tx-active { background: #b71c1c; border-color: #f44336; color: #fff;
    animation: pulse .5s infinite alternate; }
  #tx-actions button.tx-next { background: #1b5e20; border-color: #76ff03; color: #76ff03; }

  /* ── Settings panel (slide-out) ─────────────────────────────────────── */
  #settings-panel { display: none; position: fixed; top: 0; right: 0; bottom: 0;
    width: 280px; background: #111; border-left: 1px solid #333; padding: 1rem;
    z-index: 100; overflow-y: auto; }
  #settings-panel.open { display: block; }
  #settings-panel h2 { font-size: .9rem; color: #4fc3f7; margin-bottom: .5rem; }
  #settings-panel .field { margin-bottom: .5rem; }
  #settings-panel label { font-size: .75rem; color: #888; display: block; margin-bottom: .2rem; }
  #settings-panel input, #settings-panel select { font-size: .8rem; padding: .3rem .4rem;
    background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; width: 100%; }
  #settings-panel button { font-size: .8rem; padding: .3rem .6rem; border-radius: 4px;
    border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; cursor: pointer; width: 100%;
    margin-bottom: .3rem; }
  .settings-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 99; }
  .settings-overlay.open { display: block; }

  /* ── Waterfall drop highlight ────────────────────────────────────────── */
  #waterfall-wrap.drop-over { outline: 2px dashed #4fc3f7; outline-offset: -2px; }
</style>
</head>
<body class="scout-mode">

<!-- Header -->
<div class="header">
  <h1>rs-ft8n</h1>
  <div class="mode-tabs">
    <button id="tab-scout" class="active">Scout</button>
    <button id="tab-snipe">Snipe</button>
  </div>
  <span class="timer" id="period-timer">--</span>
  <span class="gear" id="btn-settings">&#9881;</span>
</div>

<!-- Waterfall -->
<div id="waterfall-wrap">
  <canvas id="waterfall"></canvas>
  <div id="snipe-overlay"></div>
  <div id="snipe-freq-label"></div>
</div>

<!-- Scout view: chat-style message flow -->
<div id="scout-view">
  <div class="chat-list" id="chat-list"></div>
</div>

<!-- Snipe view: target-focused -->
<div id="snipe-view">
  <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem">
    <div class="snipe-phase-tabs">
      <button id="btn-watch" class="active">Watch</button>
      <button id="btn-call">Call</button>
    </div>
    <span id="snipe-phase-hint" style="font-size:.7rem;color:#666">full-band — tap WF to set DF</span>
  </div>
  <div class="snipe-target" id="snipe-target">
    <div class="dx-call" id="snipe-dx-call">No target</div>
    <div class="dx-msg" id="snipe-dx-msg"></div>
    <div class="dx-info" id="snipe-dx-info"></div>
    <div id="snipe-callers" style="margin-top:.3rem;font-size:.75rem;color:#888"></div>
  </div>
  <div class="qso-progress" id="qso-progress">
    <span class="dot" id="dot-1"></span>
    <span class="dot" id="dot-2"></span>
    <span class="dot" id="dot-3"></span>
    <span class="dot" id="dot-4"></span>
    <span class="label" id="qso-label">IDLE</span>
  </div>
  <div id="snipe-tx-line" style="font-size:.8rem;color:#ffeb3b;margin:.3rem 0"></div>
  <div class="snipe-band" id="snipe-band"></div>
  <div class="chat-list" id="snipe-rx-list" style="flex:1;overflow-y:auto;margin-top:.3rem"></div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <div id="tx-actions"></div>
  <button id="btn-halt" class="halt">Halt</button>
  <label><input type="checkbox" id="auto-qso"> Auto</label>
  <span class="status" id="status">Ready</span>
</div>

<!-- Hidden file input for WAV -->
<input type="file" id="file-input" accept=".wav" style="display:none">

<!-- Settings slide-out -->
<div class="settings-overlay" id="settings-overlay"></div>
<div id="settings-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
    <h2 style="margin:0">Settings</h2>
    <button id="btn-close-settings" style="font-size:1rem;background:none;border:none;color:#888;cursor:pointer">&times;</button>
  </div>
  <div class="field">
    <label>My Callsign</label>
    <input type="text" id="my-call" placeholder="JA1ABC" style="text-transform:uppercase">
  </div>
  <div class="field">
    <label>My Grid</label>
    <input type="text" id="my-grid" placeholder="PM95" style="text-transform:uppercase;width:5em">
  </div>
  <div class="field">
    <label>Audio Input</label>
    <select id="audio-device"><option>-- select --</option></select>
  </div>
  <div class="field">
    <label>Audio Output</label>
    <select id="audio-output-device"><option value="">-- default --</option></select>
  </div>
  <div class="field">
    <label>DX Call (AP)</label>
    <input type="text" id="snipe-call" placeholder="3Y0Z" style="text-transform:uppercase">
  </div>
  <div class="field">
    <label>CAT Protocol</label>
    <select id="cat-protocol">
      <option value="yaesu">Yaesu (FTDX10)</option>
      <option value="civ">Icom (CI-V)</option>
    </select>
  </div>
  <button id="btn-cat">Connect CAT</button>
  <span class="cat-status" id="cat-status" style="font-size:.75rem;color:#666;display:block;margin-bottom:.5rem">not connected</span>
  <button id="btn-start">Start Audio</button>
  <button id="btn-qso-reset">Reset QSO</button>
  <button id="btn-open-wav">Open WAV File</button>
  <div style="margin-top:1rem">
    <label><input type="checkbox" id="subtract-mode" checked> Multi-pass subtract</label>
    <label><input type="checkbox" id="ap-mode" checked> A Priori (AP) decode</label>
  </div>
  <div style="margin-top:1rem;border-top:1px solid #333;padding-top:.5rem">
    <h2 style="font-size:.85rem">Log</h2>
    <button id="btn-export-zip">Export ZIP (ADIF + RX)</button>
    <button id="btn-clear-log" style="color:#f44336;border-color:#f44336">Clear All Logs</button>
    <div id="qso-list" style="margin-top:.4rem;font-size:.7rem;color:#888;max-height:120px;overflow-y:auto"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
