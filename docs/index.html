<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#4fc3f7">
<link rel="manifest" href="manifest.json">
<title>rs-ft8n</title>
<style>
  /* ── Design tokens ─────────────────────────────────────────────────── */
  :root {
    --fs-lg: 1.1rem;   /* titles, prominent calls */
    --fs-base: 0.85rem; /* body, buttons, messages */
    --fs-sm: 0.75rem;   /* columns, labels, secondary */
    --fs-xs: 0.65rem;   /* hints, separators */
    --c-bg: #0a0a0a;
    --c-surface: #111;
    --c-surface2: #1a1a2e;
    --c-border: #333;
    --c-text: #e0e0e0;
    --c-text2: #888;
    --c-accent: #4fc3f7;
    --c-accent-bg: #0d47a1;
    --c-success: #76ff03;
    --c-warn: #ffeb3b;
    --c-danger: #f44336;
    --c-snr: #81c784;
    --sp-xs: 0.25rem;
    --sp-sm: 0.5rem;
    --sp-md: 1rem;
    --radius-sm: 4px;
    --radius-md: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* Dark scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--c-bg); }
  ::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--c-text2); }
  * { scrollbar-width: thin; scrollbar-color: var(--c-border) var(--c-bg); }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
         background: var(--c-bg); color: var(--c-text); max-width: 960px; margin: 0 auto;
         display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
         font-size: var(--fs-base); }

  /* ── Header ─────────────────────────────────────────────────────────── */
  .header { display: flex; align-items: center; gap: var(--sp-sm); padding: var(--sp-xs) var(--sp-sm);
            background: var(--c-surface); border-bottom: 1px solid var(--c-border); flex-shrink: 0; }
  .header h1 { font-size: var(--fs-lg); color: var(--c-text2); cursor: pointer; transition: color .2s;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
  .header h1.live { color: var(--c-accent); }
  .mode-tabs { display: flex; gap: 0; }
  .mode-tabs button { font-size: var(--fs-sm); padding: var(--sp-xs) 0.6rem; border: 1px solid var(--c-border);
    background: var(--c-surface2); color: var(--c-text2); cursor: pointer; min-height: 32px; }
  .mode-tabs button:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
  .mode-tabs button:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .mode-tabs button.active { background: var(--c-accent-bg); color: var(--c-accent); border-color: var(--c-accent); }
  .band-sel { font-size: var(--fs-sm); background: var(--c-surface2); color: var(--c-snr);
    border: 1px solid var(--c-border); border-radius: var(--radius-sm);
    padding: var(--sp-xs); margin-left: auto; min-width: 5em; }
  .timer { font-size: var(--fs-base); color: var(--c-snr); font-variant-numeric: tabular-nums;
    min-width: 2.5em; text-align: right; flex-shrink: 0; transition: color .2s; }
  .timer.tx-on { color: var(--c-danger); font-weight: bold; }
  .header .gear { font-size: var(--fs-lg); color: var(--c-text2); cursor: pointer;
    padding: var(--sp-xs); border: 1px solid var(--c-border); border-radius: var(--radius-sm);
    line-height: 1; flex-shrink: 0; }
  .header .gear:hover { color: var(--c-accent); border-color: var(--c-accent); }

  /* ── Waterfall ──────────────────────────────────────────────────────── */
  #waterfall-wrap { position: relative; flex-shrink: 0; cursor: crosshair; }
  #waterfall { width: 100%; display: block; background: #000; border-bottom: 1px solid var(--c-border); }
  .scout-mode #waterfall { height: min(25vh, 220px); }
  .snipe-mode #waterfall { height: 280px; }
  #snipe-overlay { position: absolute; top: 0; bottom: 0; background: rgba(79,195,247,0.12);
    border-left: 1px solid rgba(79,195,247,0.5); border-right: 1px solid rgba(79,195,247,0.5);
    pointer-events: none; display: none; }
  #snipe-freq-label { position: absolute; top: 18px; color: var(--c-accent); font-size: var(--fs-sm);
    pointer-events: none; display: none; }

  /* ── Scout status bar ──────────────────────────────────────────────── */
  #scout-status { display: none; flex-shrink: 0; }
  .scout-mode #scout-status { display: flex; align-items: center; gap: var(--sp-xs);
    padding: var(--sp-xs) var(--sp-sm); background: var(--c-surface);
    border-bottom: 1px solid var(--c-border); font-size: var(--fs-sm); }
  #scout-status .dot, .qso-progress .dot { width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid var(--c-text2); display: inline-block; flex-shrink: 0; }
  .dot.done { background: var(--c-success); border-color: var(--c-success); }
  .dot.current { background: var(--c-accent); border-color: var(--c-accent); }
  #scout-status .state, .qso-progress .label { color: var(--c-accent); font-weight: bold; }
  #scout-status .dx { color: var(--c-success); font-weight: bold; }
  #scout-status .decode-info { color: var(--c-text2); margin-left: auto; font-size: var(--fs-xs);
    flex-shrink: 0; }
  #scout-status .tx-queue { color: var(--c-danger); font-weight: bold; font-size: var(--fs-sm);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Message list (shared Scout & Snipe) ────────────────────────────── */
  #scout-view { flex: 1; overflow-y: auto; display: none; }
  .scout-mode #scout-view { display: flex; flex-direction: column; }
  .chat-list { flex: 1; overflow-y: auto; padding: var(--sp-xs) var(--sp-sm); }
  .chat-msg { padding: var(--sp-xs) var(--sp-sm); margin-bottom: 2px; border-radius: var(--radius-md);
    font-size: var(--fs-base); display: flex; align-items: baseline; gap: var(--sp-xs); }
  .chat-msg.rx { background: var(--c-surface); border-left: 3px solid var(--c-accent); }
  .chat-msg.tx { background: #1a1a1a; border-left: 3px solid var(--c-text2); color: var(--c-text2); }
  .chat-msg.tx.sending { border-left-color: var(--c-danger); color: var(--c-danger); }
  .chat-msg.qso-active { border-left-color: var(--c-accent); background: #0a1929; }
  .chat-msg.qso-done { border-left-color: var(--c-success); }
  .period-sep { display: flex; align-items: center; gap: var(--sp-xs); margin: var(--sp-xs) 0;
    font-size: var(--fs-xs); color: var(--c-text2); }
  .period-sep::before, .period-sep::after { content: ''; flex: 1; border-top: 1px solid var(--c-border); }
  .period-sep::before { max-width: var(--sp-sm); }
  .chat-msg .col-freq { color: var(--c-text2); font-size: var(--fs-sm); min-width: 2.8em; text-align: right; }
  .chat-msg .col-dt { color: var(--c-text2); font-size: var(--fs-sm); min-width: 2.5em; text-align: right; }
  .chat-msg .col-snr { color: var(--c-snr); font-size: var(--fs-sm); min-width: 2em; text-align: right; }
  .chat-msg .text { flex: 1; }
  .empty-state { color: var(--c-text2); font-size: var(--fs-sm); text-align: center;
    padding: var(--sp-md); line-height: 1.8; }
  .empty-state b { color: var(--c-accent); }
  .chat-msg .text .call { color: var(--c-warn); font-weight: bold; }
  .chat-msg .text .target { color: var(--c-success); font-weight: bold; }

  /* ── Snipe view ─────────────────────────────────────────────────────── */
  #snipe-view { flex: 1; overflow-y: auto; display: none; padding: var(--sp-xs) var(--sp-sm); }
  .snipe-mode #snipe-view { display: flex; flex-direction: column; }
  .snipe-target { background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: var(--radius-md); padding: var(--sp-sm); margin-bottom: var(--sp-xs); }
  .snipe-target .dx-call { font-size: var(--fs-lg); color: var(--c-success); font-weight: bold; }
  .snipe-target .dx-msg { font-size: var(--fs-base); color: var(--c-warn); margin-top: var(--sp-xs); }
  .snipe-target .dx-info { font-size: var(--fs-sm); color: var(--c-text2); }
  .qso-progress { display: flex; align-items: center; gap: var(--sp-xs); margin: var(--sp-xs) 0;
    font-size: var(--fs-base); }
  .qso-progress .label { margin-left: var(--sp-xs); }
  .snipe-band { font-size: var(--fs-sm); color: var(--c-text2); margin-top: var(--sp-xs); }
  .snipe-band span { margin-right: var(--sp-sm); }
  .snipe-phase-tabs { display: flex; gap: 0; }
  .snipe-phase-tabs button { font-size: var(--fs-sm); padding: var(--sp-xs) 0.6rem;
    border: 1px solid var(--c-border); background: var(--c-surface2); color: var(--c-text2);
    cursor: pointer; min-height: 32px; }
  .snipe-phase-tabs button:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
  .snipe-phase-tabs button:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .snipe-phase-tabs button.active { background: #1b5e20; color: var(--c-success); border-color: var(--c-success); }
  .snipe-call-phase #snipe-callers { display: none; }
  .snipe-call-phase #snipe-band { display: none; }

  /* ── Bottom bar ─────────────────────────────────────────────────────── */
  .bottom-bar { display: flex; align-items: center; gap: var(--sp-sm); padding: var(--sp-xs) var(--sp-sm);
    background: var(--c-surface); border-top: 1px solid var(--c-border); flex-shrink: 0; }
  .bottom-bar button, #tx-actions button { font-size: var(--fs-base); padding: var(--sp-sm) 0.8rem;
    border-radius: var(--radius-md); border: 1px solid var(--c-border); background: var(--c-surface2);
    color: var(--c-text); cursor: pointer; font-weight: bold; min-height: 44px; }
  .bottom-bar button.halt { border-color: var(--c-danger); color: var(--c-danger); }
  .bottom-bar button:disabled { opacity: 0.3; cursor: default; }
  .bottom-bar label { font-size: var(--fs-base); display: flex; align-items: center; gap: var(--sp-xs); }
  .toggle { cursor: pointer; user-select: none; }
  .toggle input { display: none; }
  .toggle-track { display: inline-block; width: 36px; height: 20px; background: var(--c-border);
    border-radius: 10px; position: relative; vertical-align: middle; transition: background .2s; }
  .toggle-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    background: var(--c-text2); border-radius: 50%; transition: transform .2s, background .2s; }
  .toggle input:checked + .toggle-track { background: var(--c-accent); }
  .toggle input:checked + .toggle-track::after { transform: translateX(16px); background: #fff; }
  @keyframes pulse { to { opacity: 0.6; } }
  #tx-actions { display: flex; gap: var(--sp-xs); flex-wrap: wrap; flex: 1; }
  #tx-actions button.cq { background: var(--c-accent-bg); border-color: var(--c-accent); color: #fff;
    padding: var(--sp-sm) 1.2rem; }
  #tx-actions button.tx-msg { border-color: var(--c-warn); color: var(--c-warn); font-weight: normal; }
  #tx-actions button.tx-active { background: #b71c1c; border-color: var(--c-danger); color: #fff;
    animation: pulse .5s infinite alternate; }
  #tx-actions button.tx-next { background: #1b5e20; border-color: var(--c-success); color: var(--c-success); }

  /* ── Settings panel ─────────────────────────────────────────────────── */
  #settings-panel { display: none; position: fixed; top: 0; right: 0; bottom: 0;
    width: 280px; background: var(--c-surface); border-left: 1px solid var(--c-border);
    padding: var(--sp-md); z-index: 100; overflow-y: auto; }
  #settings-panel.open { display: block; }
  #settings-panel h2 { font-size: var(--fs-base); color: var(--c-accent); margin-bottom: var(--sp-sm); }
  .accordion { margin-bottom: var(--sp-xs); border: 1px solid var(--c-border);
    border-radius: var(--radius-md); overflow: hidden; }
  .accordion summary { font-size: var(--fs-base); font-weight: bold; color: var(--c-accent);
    padding: var(--sp-sm); cursor: pointer; background: var(--c-surface2);
    list-style: none; display: flex; align-items: center; gap: var(--sp-xs); }
  .accordion summary::before { content: '\25b6'; font-size: var(--fs-xs); transition: transform .2s; }
  .accordion[open] summary::before { transform: rotate(90deg); }
  .accordion summary::-webkit-details-marker { display: none; }
  .accordion > :not(summary) { padding: 0 var(--sp-sm); }
  .accordion > .field:first-of-type { padding-top: var(--sp-sm); }
  .accordion > :last-child { padding-bottom: var(--sp-sm); }
  #settings-panel .field { margin-bottom: var(--sp-sm); }
  #settings-panel label { font-size: var(--fs-sm); color: var(--c-text2); display: block;
    margin-bottom: var(--sp-xs); }
  #settings-panel input, #settings-panel select { font-size: var(--fs-base); padding: var(--sp-xs) var(--sp-sm);
    background: var(--c-surface2); color: var(--c-text); border: 1px solid var(--c-border);
    border-radius: var(--radius-sm); width: 100%; min-height: 36px; }
  #settings-panel button { font-size: var(--fs-base); padding: var(--sp-xs) var(--sp-sm);
    border-radius: var(--radius-sm); border: 1px solid var(--c-border); background: var(--c-surface2);
    color: var(--c-text); cursor: pointer; width: 100%; margin-bottom: var(--sp-xs); min-height: 36px; }
  .settings-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 99; }
  .settings-overlay.open { display: block; }

  /* ── Toast notification ──────────────────────────────────────────── */
  .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
    background: var(--c-success); color: var(--c-bg); font-size: var(--fs-base); font-weight: bold;
    padding: var(--sp-sm) var(--sp-md); border-radius: var(--radius-md);
    opacity: 0; transition: opacity .3s, transform .3s; z-index: 200; pointer-events: none; }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  /* ── Waterfall drop highlight ──────────────────────────────────────── */
  #waterfall-wrap.drop-over { outline: 2px dashed var(--c-accent); outline-offset: -2px; }

  /* ── Responsive: mobile ────────────────────────────────────────────── */
  @media (max-width: 600px) {
    :root {
      --fs-lg: 1.25rem;
      --fs-base: 1rem;
      --fs-sm: 0.85rem;
      --fs-xs: 0.75rem;
    }
    .header .gear { font-size: 1.4rem; }
    #scout-status .dot, .qso-progress .dot { width: 12px; height: 12px; }
    #settings-panel { width: 100%; }
  }
</style>
</head>
<body class="scout-mode">

<!-- Header -->
<div class="header">
  <h1>rs-ft8n</h1>
  <div class="mode-tabs">
    <button id="tab-scout" class="active">Scout</button>
    <button id="tab-snipe">Snipe</button>
  </div>
  <select id="band-header" class="band-sel"></select>
  <span class="timer" id="period-timer">--</span>
  <span class="gear" id="btn-settings">&#9881;</span>
</div>

<!-- Waterfall -->
<div id="waterfall-wrap">
  <canvas id="waterfall"></canvas>
  <div id="snipe-overlay"></div>
  <div id="snipe-freq-label"></div>
</div>

<!-- Scout status bar -->
<div id="scout-status">
  <span class="dot" id="scout-dot-1"></span>
  <span class="dot" id="scout-dot-2"></span>
  <span class="dot" id="scout-dot-3"></span>
  <span class="dot" id="scout-dot-4"></span>
  <span class="state" id="scout-state"></span>
  <span class="dx" id="scout-dx"></span>
  <span class="decode-info" id="scout-decode-info"></span>
  <span class="tx-queue" id="scout-tx-queue"></span>
</div>

<!-- Scout QSO target (shown during active QSO) -->
<div id="scout-target" class="snipe-target" style="display:none;margin:var(--sp-xs) var(--sp-sm)">
  <div class="dx-call" id="scout-target-call"></div>
  <div class="dx-msg" id="scout-target-msg"></div>
  <div class="dx-info" id="scout-target-info"></div>
</div>

<!-- Scout view: chat-style message flow -->
<div id="scout-view">
  <div class="chat-list" id="chat-list">
    <div class="empty-state" id="empty-state">
      Tap <b>rs-ft8n</b> logo to start audio<br>
      Tap waterfall to set TX frequency<br>
      Tap a decoded message to call
    </div>
  </div>
</div>

<!-- Snipe view: target-focused -->
<div id="snipe-view">
  <div style="display:flex;align-items:center;gap:var(--sp-xs);margin-bottom:var(--sp-xs)">
    <div class="snipe-phase-tabs">
      <button id="btn-watch" class="active">Watch</button>
      <button id="btn-call">Call</button>
    </div>
    <span id="snipe-phase-hint" style="font-size:var(--fs-xs);color:var(--c-text2)">full-band</span>
  </div>
  <div class="snipe-target" id="snipe-target">
    <div class="dx-call" id="snipe-dx-call">No target</div>
    <div class="dx-msg" id="snipe-dx-msg"></div>
    <div class="dx-info" id="snipe-dx-info"></div>
    <div id="snipe-callers" style="margin-top:var(--sp-xs);font-size:var(--fs-sm);color:var(--c-text2)"></div>
  </div>
  <div class="qso-progress" id="qso-progress">
    <span class="dot" id="dot-1"></span>
    <span class="dot" id="dot-2"></span>
    <span class="dot" id="dot-3"></span>
    <span class="dot" id="dot-4"></span>
    <span class="label" id="qso-label">IDLE</span>
  </div>
  <div id="snipe-tx-line" style="font-size:var(--fs-sm);color:var(--c-warn);margin:var(--sp-xs) 0"></div>
  <div class="snipe-band" id="snipe-band"></div>
  <div class="chat-list" id="snipe-rx-list" style="flex:1;overflow-y:auto;margin-top:var(--sp-xs)"></div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <div id="tx-actions"></div>
  <button id="btn-halt" class="halt" style="display:none">Halt</button>
  <label class="toggle"><input type="checkbox" id="auto-qso"><span class="toggle-track"></span> Auto</label>
</div>

<!-- Hidden file input for WAV -->
<input type="file" id="file-input" accept=".wav" style="display:none">

<!-- Settings slide-out -->
<div class="settings-overlay" id="settings-overlay"></div>
<div id="settings-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-sm)">
    <h2 style="margin:0">Settings</h2>
    <button id="btn-close-settings" style="font-size:1.2rem;background:none;border:none;color:var(--c-text2);cursor:pointer;width:auto;min-height:auto">&times;</button>
  </div>
  <details class="accordion" open>
    <summary>Station</summary>
    <div class="field">
      <label>My Callsign</label>
      <input type="text" id="my-call" placeholder="JA1ABC" style="text-transform:uppercase">
    </div>
    <div class="field">
      <label>My Grid</label>
      <input type="text" id="my-grid" placeholder="PM95" style="text-transform:uppercase;width:5em">
    </div>
    <div class="field">
      <label>Band (MHz)</label>
      <select id="band-freq">
        <option value="1.840">1.840 (160m)</option>
        <option value="3.531">3.531 (80m JA)</option>
        <option value="3.573">3.573 (80m DX)</option>
        <option value="7.041">7.041 (40m JA)</option>
        <option value="7.074">7.074 (40m DX)</option>
        <option value="10.136">10.136 (30m)</option>
        <option value="14.074" selected>14.074 (20m)</option>
        <option value="18.100">18.100 (17m)</option>
        <option value="21.074">21.074 (15m)</option>
        <option value="24.915">24.915 (12m)</option>
        <option value="28.074">28.074 (10m)</option>
        <option value="50.313">50.313 (6m)</option>
        <option value="144.174">144.174 (2m DX)</option>
        <option value="144.460">144.460 (2m JA)</option>
        <option value="432.065">432.065 (70cm)</option>
        <option value="1296.065">1296.065 (23cm)</option>
      </select>
    </div>
    <div class="field">
      <label>Audio Input</label>
      <select id="audio-device"><option>-- select --</option></select>
    </div>
    <div class="field">
      <label>Audio Output</label>
      <select id="audio-output-device"><option value="">-- default --</option></select>
    </div>
    <button id="btn-start">Start Audio</button>
  </details>
  <details class="accordion">
    <summary>CAT</summary>
    <div class="field">
      <label>Rig Model</label>
      <select id="rig-model"></select>
    </div>
    <button id="btn-cat">Connect CAT</button>
    <button id="btn-cat-ble" style="display:none">Connect BLE</button>
    <span class="cat-status" id="cat-status" style="font-size:var(--fs-xs);color:var(--c-text2);display:block;margin-bottom:var(--sp-sm)">not connected</span>
  </details>
  <details class="accordion">
    <summary>Decode</summary>
    <label><input type="checkbox" id="subtract-mode" checked> Multi-pass subtract</label>
    <label><input type="checkbox" id="ap-mode" checked> A Priori (AP)</label>
    <label><input type="checkbox" id="cq-first-decoded"> CQ response: first decoded (default: strongest SNR)</label>
    <button id="btn-open-wav">Open WAV File</button>
  </details>
  <details class="accordion">
    <summary>Log</summary>
    <button id="btn-export-zip">Export ZIP (ADIF + RX)</button>
    <button id="btn-clear-log" style="color:var(--c-danger);border-color:var(--c-danger)">Clear All Logs</button>
    <div id="qso-list" style="margin-top:var(--sp-xs);font-size:var(--fs-xs);color:var(--c-text2);max-height:120px;overflow-y:auto"></div>
  </details>
</div>

<script type="module" src="app.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
