<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rs-ft8n WASM Decoder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
         background: #0a0a0a; color: #e0e0e0; padding: .5rem; max-width: 960px; margin: 0 auto; }
  h1 { font-size: 1.2rem; color: #4fc3f7; display: inline; }
  .header { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; flex-wrap: wrap; }
  .header .ver { font-size: .75rem; color: #666; }

  /* Waterfall */
  #waterfall-wrap { position: relative; margin-bottom: .5rem; cursor: crosshair; }
  #waterfall { width: 100%; height: 300px; background: #000; display: block; border: 1px solid #222; }
  #snipe-overlay { position: absolute; top: 0; bottom: 0; background: rgba(79,195,247,0.12);
    border-left: 1px solid rgba(79,195,247,0.5); border-right: 1px solid rgba(79,195,247,0.5);
    pointer-events: none; display: none; }
  #snipe-freq-label { position: absolute; top: 18px; color: #4fc3f7; font-size: .7rem;
    pointer-events: none; display: none; }

  /* Controls */
  .controls { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap;
              margin-bottom: .5rem; font-size: .85rem; }
  .controls select, .controls button, .controls input[type=text] {
    font-size: .8rem; padding: .25rem .5rem;
    background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; }
  .controls button { cursor: pointer; }
  .controls button.active { background: #0d47a1; border-color: #4fc3f7; }
  .controls button.snipe-on { background: #b71c1c; border-color: #f44336; }
  .controls .timer { font-variant-numeric: tabular-nums; color: #81c784; min-width: 3.5em; }
  .controls label { display: flex; align-items: center; gap: .3rem; }
  #snipe-call { width: 7em; text-transform: uppercase; }
  #snipe-call::placeholder { color: #555; text-transform: none; }

  /* Status */
  #status { font-size: .85rem; color: #aaa; margin-bottom: .3rem; min-height: 1.2em; }
  #timing { font-size: .85rem; color: #81c784; margin-bottom: .5rem; min-height: 1.2em; }

  /* Results table */
  table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  th { background: #1a1a2e; color: #4fc3f7; padding: .3rem .4rem; text-align: left;
       border-bottom: 1px solid #333; position: sticky; top: 0; }
  td { padding: .25rem .4rem; border-bottom: 1px solid #1a1a1a; }
  tr:hover td { background: #1a1a2e; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .msg { color: #ffeb3b; font-weight: bold; }
  tr.target td { background: #1b2a1b; }
  tr.target .msg { color: #76ff03; }
  #results-wrap { max-height: 250px; overflow-y: auto; }

  /* File drop */
  #drop-zone {
    border: 1px dashed #444; border-radius: 6px; padding: .8rem; text-align: center;
    cursor: pointer; font-size: .8rem; color: #666; margin-top: .5rem;
  }
  #drop-zone.over { border-color: #4fc3f7; color: #4fc3f7; }
  #drop-zone input { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>rs-ft8n</h1>
  <span class="ver">WASM FT8 Decoder</span>
</div>

<div class="controls">
  <select id="audio-device" disabled><option>-- audio device --</option></select>
  <button id="btn-start" disabled>Start</button>
  <span class="timer" id="period-timer">--</span>
  <label><input type="checkbox" id="subtract-mode" checked> Subtract</label>
  <span style="color:#444">|</span>
  <button id="btn-snipe">Snipe</button>
  <input type="text" id="snipe-call" placeholder="DX Call" disabled>
  <span id="snipe-status" style="font-size:.75rem;color:#666"></span>
</div>

<div id="waterfall-wrap">
  <canvas id="waterfall"></canvas>
  <div id="snipe-overlay"></div>
  <div id="snipe-freq-label"></div>
</div>

<div id="status"></div>
<div id="timing"></div>

<div id="results-wrap">
<table id="results" hidden>
<thead>
  <tr><th>#</th><th class="num">Freq</th><th class="num">dt</th>
      <th class="num">SNR</th><th class="num">Err</th><th>P</th><th>Message</th></tr>
</thead>
<tbody></tbody>
</table>
</div>

<div id="drop-zone" tabindex="0">
  <p>Drop 12 kHz WAV or click to select</p>
  <input type="file" id="file-input" accept=".wav">
</div>

<script type="module" src="app.js"></script>
</body>
</html>
